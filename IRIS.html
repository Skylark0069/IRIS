/* ============================================
   MATCHED FUNCTIONS SUMMARY
   ============================================ */
function MatchedFunctionsSummary({ allPatents }) {
  const [confidenceFilter, setConfidenceFilter] = useState("low"); // "low", "medium", "high"
  const [expandedFn, setExpandedFn] = useState(null);
  const [selectedPatent, setSelectedPatent] = useState(null);

  // Normalize function name: strip leading number prefix, unify separators, Title Case
  function normalizeFnName(raw) {
    let name = (raw || "").trim();
    if (!name) return "";
    // Remove leading number prefix: "10.", "10. ", "10 - ", "10-", "1.", etc.
    name = name.replace(/^\d+[.\-\s]*\s*/, "");
    // Replace underscores and hyphens with spaces
    name = name.replace(/[_-]/g, " ");
    // Title Case
    name = name.replace(/\b\w/g, c => c.toUpperCase());
    return name.trim();
  }

  // Build patent lookup map for title/abstract display
  const patentMap = {};
  allPatents.forEach(({ patentNum, patent }) => {
    patentMap[patentNum] = patent;
  });

  // Aggregate functions across all patents
  const functionMap = {};
  allPatents.forEach(({ patentNum, patent }) => {
    const fns = patent.matched_functions || [];
    fns.forEach(fn => {
      const name = normalizeFnName(fn.function_name);
      if (!name) return;
      const key = name.toLowerCase();
      const confVal = String(fn.confidence || "low").toLowerCase();
      if (!functionMap[key]) {
        functionMap[key] = {
          function_name: name,
          function_id: fn.function_id || "",
          confidence: confVal,
          patent_count: 0,
          patents: [],
          confidences: {}
        };
      }
      if (!functionMap[key].patents.includes(patentNum)) {
        functionMap[key].patents.push(patentNum);
        functionMap[key].patent_count++;
      }
      // Track per-patent confidence (normalized)
      functionMap[key].confidences[patentNum] = confVal;
      // Track highest confidence across all patents for this function
      const confRank = { high: 3, medium: 2, low: 1 };
      const newRank = confRank[confVal] || 0;
      const curRank = confRank[functionMap[key].confidence] || 0;
      if (newRank > curRank) {
        functionMap[key].confidence = confVal;
      }
    });
  });

  const confidenceRank = { high: 3, medium: 2, low: 1 };
  let functions = Object.values(functionMap);

  // Filter by confidence (with fallback for safety)
  functions = functions.filter(fn => {
    const fnRank = confidenceRank[fn.confidence] || 0;
    const filterRank = confidenceRank[confidenceFilter] || 0;
    return fnRank >= filterRank;
  });

  // Sort by patent count desc, then name asc
  functions.sort((a, b) => {
    if (b.patent_count !== a.patent_count) return b.patent_count - a.patent_count;
    return a.function_name.localeCompare(b.function_name);
  });

  // Helper: filter a function's patents by current confidence level
  function getFilteredPatents(fn) {
    const filterRank = confidenceRank[confidenceFilter] || 0;
    return fn.patents.filter(pn => {
      const pConf = fn.confidences[pn] || "low";
      return (confidenceRank[pConf] || 0) >= filterRank;
    });
  }

  const CONFIDENCE_FILTERS = [
    { value: "low", label: "Low & above" },
    { value: "medium", label: "Medium & above" },
    { value: "high", label: "High only" },
  ];

  return (
    <div>
      <div className="confidence-filter-bar">
        <span className="confidence-filter-label">Confidence:</span>
        {CONFIDENCE_FILTERS.map(f => (
          <button key={f.value}
            className={`confidence-filter-pill${confidenceFilter === f.value ? " active" : ""}`}
            onClick={() => { setConfidenceFilter(f.value); setExpandedFn(null); setSelectedPatent(null); }}>
            {f.label}
          </button>
        ))}
        <span style={{fontSize:"12px",color:"var(--text-muted)",marginLeft:"auto"}}>
          {functions.length} function{functions.length !== 1 ? "s" : ""}
        </span>
      </div>
      {functions.length === 0 ? (
        <div className="fn-summary-empty">
          No functions match the selected confidence level.
        </div>
      ) : (
        <div className="functions-summary-grid">
          {functions.map((fn, idx) => {
            const filteredPatents = getFilteredPatents(fn);
            return (
            <React.Fragment key={fn.function_name + "-" + idx}>
              <div className="fn-summary-card"
                onClick={() => {
                  setSelectedPatent(null);
                  setExpandedFn(expandedFn === fn.function_name ? null : fn.function_name);
                }}>
                <span className="fn-summary-name">{fn.function_name}</span>
                <div className="fn-summary-count">
                  <span className="fn-summary-count-num">{filteredPatents.length}</span>
                  <span className="fn-summary-count-label">patent{filteredPatents.length !== 1 ? "s" : ""}</span>
                </div>
              </div>
              {expandedFn === fn.function_name && (
                <div className="fn-summary-detail">
                  <div style={{fontSize:"13px",fontWeight:500,color:"var(--text)",marginBottom:10}}>
                    {confidenceFilter === "low" ? (
                      <>Referenced in {filteredPatents.length} patent{filteredPatents.length !== 1 ? "s" : ""}:</>
                    ) : (
                      <>Matching &ldquo;{CONFIDENCE_FILTERS.find(f => f.value === confidenceFilter)?.label}&rdquo; — {filteredPatents.length} patent{filteredPatents.length !== 1 ? "s" : ""}:</>
                    )}
                  </div>
                  <div className="fn-detail-patent-list">
                    {filteredPatents.map(pn => (
                      <span key={pn} className="fn-detail-patent-tag"
                        style={{cursor:"pointer"}}
                        onClick={(e) => { e.stopPropagation(); setSelectedPatent(selectedPatent === pn ? null : pn); }}>
                        {pn}
                        <span className={`confidence-badge ${confidenceClass(fn.confidences[pn])}`}
                          style={{fontSize:"10px",padding:"1px 6px"}}>
                          {fn.confidences[pn]}
                        </span>
                      </span>
                    ))}
                  </div>
                  {selectedPatent && patentMap[selectedPatent] && (() => {
                    const p = patentMap[selectedPatent];
                    return (
                      <div className="patent-inline-detail">
                        <div className="patent-inline-title">{p.patent_title || "Untitled Patent"}</div>
                        {p.prioritydate && (
                          <div className="patent-inline-date">{p.prioritydate}</div>
                        )}
                        <div className="patent-inline-abstract">
                          {p.patent_abstract || "No abstract available."}
                        </div>
                      </div>
                    );
                  })()}
                </div>
              )}
            </React.Fragment>
          )})}
        </div>
      )}
    </div>
  );
}

/* ============================================
   SECTION 3: CHARTS
   ============================================ */
function ChartsSection({ compounds }) {
  const [selectedArea, setSelectedArea] = useState("TOTAL");
  const [selectedCompoundIdx, setSelectedCompoundIdx] = useState(0);
  const numChartRef = useRef(null);
  const prChartRef = useRef(null);
  const numChartInst = useRef(null);
  const prChartInst = useRef(null);

  const compoundIds = Object.keys(compounds || {});
  const currentCompound = compounds?.[compoundIds[selectedCompoundIdx]];

  // JSON data uses "EP" key; UI shows "EU" — map accordingly
  const lookupArea = selectedArea === "EU" ? "EP" : selectedArea;
  const numData = currentCompound?.past_numofpatents?.[lookupArea] || {};
  const prData  = currentCompound?.past_pageranks?.[lookupArea] || {};
  const numSorted = sortYearData(numData);
  const prSorted  = sortYearData(prData);

  const areaColor = AREA_COLORS[selectedArea] || "#6C5CE7";

  useEffect(() => {
    if (!numChartRef.current || !prChartRef.current) return;

    if (numChartInst.current) numChartInst.current.destroy();
    if (prChartInst.current) prChartInst.current.destroy();

    const chartOptions = {
      responsive: true,
      maintainAspectRatio: false,
      animation: {
        duration: 900,
        easing: "easeOutQuart",
      },
      transitions: {
        active: { animation: { duration: 280 } },
      },
      plugins: {
        legend: { display: false },
        tooltip: {
          backgroundColor: "#fff",
          titleColor: "#2D2B3A",
          bodyColor: "#2D2B3A",
          borderColor: "#EBE9F3",
          borderWidth: 1,
          padding: 12,
          cornerRadius: 8,
          titleFont: { family: "Outfit", weight: "600", size: 13 },
          bodyFont: { family: "Outfit", size: 13 },
          displayColors: false,
          callbacks: {
            label: (ctx) => `${ctx.dataset.label}: ${ctx.parsed.y}`,
          },
        },
      },
      scales: {
        x: {
          grid: { color: "#F2F1F8", drawBorder: false },
          ticks: { font: { family: "Outfit", size: 11 }, color: "#B0AEC0" },
          title: { display: true, text: "Year", font: { family: "Outfit", size: 12, weight: "500" }, color: "#7C7A8A" },
        },
        y: {
          grid: { color: "#F2F1F8", drawBorder: false },
          ticks: { font: { family: "Outfit", size: 11 }, color: "#B0AEC0" },
          beginAtZero: false,
        },
      },
      interaction: { intersect: false, mode: "index" },
    };

    const ctx1 = numChartRef.current.getContext("2d");
    numChartInst.current = new Chart(ctx1, {
      type: "line",
      data: {
        labels: numSorted.map(([y]) => y),
        datasets: [{
          label: "Patent Count",
          data: numSorted.map(([,v]) => v),
          borderColor: areaColor,
          backgroundColor: areaColor + "20",
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: areaColor,
          pointBorderColor: "#fff",
          pointBorderWidth: 2,
          fill: true,
          tension: 0.35,
        }],
      },
      options: chartOptions,
    });

    const ctx2 = prChartRef.current.getContext("2d");
    prChartInst.current = new Chart(ctx2, {
      type: "line",
      data: {
        labels: prSorted.map(([y]) => y),
        datasets: [{
          label: "PageRank",
          data: prSorted.map(([,v]) => v),
          borderColor: areaColor,
          backgroundColor: areaColor + "20",
          borderWidth: 2.5,
          pointRadius: 4,
          pointHoverRadius: 7,
          pointBackgroundColor: areaColor,
          pointBorderColor: "#fff",
          pointBorderWidth: 2,
          fill: true,
          tension: 0.35,
        }],
      },
      options: {
        ...chartOptions,
        scales: {
          ...chartOptions.scales,
          y: { ...chartOptions.scales.y, title: { display: true, text: "PageRank", font: { family: "Outfit", size: 12, weight: "500" }, color: "#7C7A8A" } },
        },
      },
    });

    return () => {
      if (numChartInst.current) numChartInst.current.destroy();
      if (prChartInst.current) prChartInst.current.destroy();
    };
  }, [selectedArea, selectedCompoundIdx, compounds]);

  const hasChartData = numSorted.length > 0 || prSorted.length > 0;

  return (
    <div>
      <div className="charts-controls">
        <span className="control-label">Region:</span>
        <div className="area-pills">
          {AREAS.map(a => (
            <button key={a} className={`area-pill${selectedArea===a?" active":""}`}
              onClick={() => setSelectedArea(a)}>{a}</button>
          ))}
        </div>
        {compoundIds.length > 1 && (
          <>
            <span className="control-label" style={{marginLeft:16}}>Compound:</span>
            <select className="search-select" style={{minWidth:80,width:"auto"}}
              value={selectedCompoundIdx}
              onChange={e => setSelectedCompoundIdx(Number(e.target.value))}>
              {compoundIds.map((id, i) => (
                <option key={id} value={i}>ID: {id}</option>
              ))}
            </select>
          </>
        )}
      </div>
      {!hasChartData ? (
        <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)",fontSize:"14px"}}>
          No historical data available for the selected region.
        </div>
      ) : (
        <div className="charts-grid">
          <div className="chart-card">
            <div className="chart-card-title">Number of Patents — {selectedArea}</div>
            <div className="chart-wrap"><canvas ref={numChartRef}/></div>
          </div>
          <div className="chart-card">
            <div className="chart-card-title">PageRank Score — {selectedArea}</div>
            <div className="chart-wrap"><canvas ref={prChartRef}/></div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ============================================
   MAIN APP
   ============================================ */
function App() {
  useEffect(() => {
    const updatePointer = (e) => {
      document.documentElement.style.setProperty("--mouse-x", `${e.clientX}px`);
      document.documentElement.style.setProperty("--mouse-y", `${e.clientY}px`);
    };
    window.addEventListener("pointermove", updatePointer, { passive: true });
    return () => window.removeEventListener("pointermove", updatePointer);
  }, []);

  const [queryType, setQueryType] = useState("NAME");
  const [queryValue, setQueryValue] = useState("");
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [results, setResults] = useState(null);
  const [searchPerformed, setSearchPerformed] = useState(false);

  // List view state
  const [activeList, setActiveList] = useState(null);
  const [listData, setListData] = useState(null);
  const [listLoading, setListLoading] = useState(false);

  // Patent search results (separate from compound search)
  const [patentResults, setPatentResults] = useState(null);
  const [patentSearchPerformed, setPatentSearchPerformed] = useState(false);
  const [patentPage, setPatentPage] = useState(1);

  // Mode: "compound" or "function"
  const [appMode, setAppMode] = useState("compound");

  // Function of Skincare state
  const [functions, setFunctions] = useState(null);
  const [functionsLoading, setFunctionsLoading] = useState(false);
  const [selectedFunction, setSelectedFunction] = useState(null);
  const [functionCompounds, setFunctionCompounds] = useState(null);
  const [functionCompoundsLoading, setFunctionCompoundsLoading] = useState(false);
  const [functionPage, setFunctionPage] = useState(1);

  // ---- Browser history support (back/forward buttons) ----
  const isRestoring = useRef(false);

  // Snapshot current view state into a plain object for history
  const snapshotState = useCallback(() => ({
    queryType, queryValue,
    results, searchPerformed,
    patentResults, patentSearchPerformed, patentPage,
    appMode,
    activeList, listData,
    functions, selectedFunction, functionCompounds, functionPage,
  }), [queryType, queryValue, results, searchPerformed, patentResults, patentSearchPerformed, patentPage, appMode, activeList, listData, functions, selectedFunction, functionCompounds, functionPage]);

  // Restore all state from a history snapshot
  const restoreSnapshot = useCallback((s) => {
    if (s.queryType !== undefined) setQueryType(s.queryType);
    if (s.queryValue !== undefined) setQueryValue(s.queryValue);
    if (s.results !== undefined) setResults(s.results);
    if (s.searchPerformed !== undefined) setSearchPerformed(s.searchPerformed);
    if (s.patentResults !== undefined) setPatentResults(s.patentResults);
    if (s.patentSearchPerformed !== undefined) setPatentSearchPerformed(s.patentSearchPerformed);
    if (s.patentPage !== undefined) setPatentPage(s.patentPage);
    if (s.appMode !== undefined) setAppMode(s.appMode);
    if (s.activeList !== undefined) setActiveList(s.activeList);
    if (s.listData !== undefined) setListData(s.listData);
    if (s.functions !== undefined) setFunctions(s.functions);
    if (s.selectedFunction !== undefined) setSelectedFunction(s.selectedFunction);
    if (s.functionCompounds !== undefined) setFunctionCompounds(s.functionCompounds);
    if (s.functionPage !== undefined) setFunctionPage(s.functionPage);
    setLoading(false);
    setListLoading(false);
    setFunctionsLoading(false);
    setFunctionCompoundsLoading(false);
    setError(null);
  }, []);

  // Listen for browser back / forward
  useEffect(() => {
    const handlePopState = (e) => {
      isRestoring.current = true;
      if (e.state && e.state._iris) {
        restoreSnapshot(e.state);
      } else {
        // No saved state → go home
        setQueryType("NAME");
        setQueryValue("");
        setLoading(false); setError(null);
        setResults(null); setSearchPerformed(false);
        setActiveList(null); setListData(null); setListLoading(false);
        setPatentResults(null); setPatentSearchPerformed(false); setPatentPage(1);
        setAppMode("compound");
        setFunctions(null); setFunctionsLoading(false);
        setSelectedFunction(null); setFunctionCompounds(null); setFunctionCompoundsLoading(false); setFunctionPage(1);
      }
      setTimeout(() => { isRestoring.current = false; }, 0);
    };
    window.addEventListener('popstate', handlePopState);
    // Seed the initial history entry so the first "back" works
    if (!window.history.state || !window.history.state._iris) {
      window.history.replaceState({ _iris: true }, '');
    }
    return () => window.removeEventListener('popstate', handlePopState);
  }, [restoreSnapshot]);

  // Push current state to browser history
  const pushHistory = useCallback(() => {
    if (isRestoring.current) return;
    window.history.pushState({ _iris: true, ...snapshotState() }, '');
  }, [snapshotState]);

  const handleSearch = useCallback(async (queryOverride) => {
    const val = (queryOverride !== undefined ? queryOverride : queryValue).trim();
    if (!val) return;
    setLoading(true);
    setError(null);
    setResults(null);
    setPatentResults(null);
    setSearchPerformed(true);
    setPatentSearchPerformed(false);
    // Clear list view when doing a search
    setActiveList(null);
    setListData(null);

    // Route patent searches to the patent endpoint
    const effectiveType = queryOverride !== undefined ? "ID" : queryType;
    if (effectiveType === "PATENT") {
      try {
        const resp = await fetch(`${API_BASE}/api/patents/search?q=${encodeURIComponent(val)}`);
        if (!resp.ok) {
          const detail = (await resp.json().catch(() => ({}))).detail;
          throw new Error(detail || `Server error (${resp.status})`);
        }
        const data = await resp.json();
        setPatentResults(data);
        setPatentSearchPerformed(true);
        setSearchPerformed(false);
        setPatentPage(1);
        // Push to browser history after state settles
        setTimeout(() => pushHistory(), 0);
      } catch (e) {
        if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
          setError("Cannot reach the API server. Please ensure the backend is running at " + API_BASE);
        } else {
          setError(e.message);
        }
      } finally {
        setLoading(false);
      }
      return;
    }

    try {
      const resp = await fetch(`${API_BASE}/api/search`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ query: val, query_type: effectiveType }),
      });
      if (!resp.ok) {
        const detail = (await resp.json().catch(() => ({}))).detail;
        throw new Error(detail || `Server error (${resp.status})`);
      }
      const data = await resp.json();
      setResults(data);
      // Push to browser history after state settles
      setTimeout(() => pushHistory(), 0);
    } catch (e) {
      if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        setError("Cannot reach the API server. Please ensure the backend is running at " + API_BASE);
      } else {
        setError(e.message);
      }
    } finally {
      setLoading(false);
    }
  }, [queryType, queryValue, pushHistory]);

  // Fetch all functions for Function of Skincare mode
  const handleFetchFunctions = useCallback(async () => {
    setFunctionsLoading(true);
    setError(null);
    setFunctions(null);
    setSelectedFunction(null);
    setFunctionCompounds(null);
    try {
      const resp = await fetch(`${API_BASE}/api/functions`);
      if (!resp.ok) {
        const detail = (await resp.json().catch(() => ({}))).detail;
        throw new Error(detail || `Server error (${resp.status})`);
      }
      const data = await resp.json();
      setFunctions(data.functions || []);
    } catch (e) {
      if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        setError("Cannot reach the API server. Please ensure the backend is running at " + API_BASE);
      } else {
        setError(e.message);
      }
    } finally {
      setFunctionsLoading(false);
    }
  }, []);

  // Click a function name to load its compounds
  const handleFunctionClick = useCallback(async (fnName) => {
    setSelectedFunction(fnName);
    setFunctionCompoundsLoading(true);
    setFunctionCompounds(null);
    setFunctionPage(1);
    setError(null);
    try {
      const resp = await fetch(`${API_BASE}/api/functions/${encodeURIComponent(fnName)}`);
      if (!resp.ok) {
        const detail = (await resp.json().catch(() => ({}))).detail;
        throw new Error(detail || `Server error (${resp.status})`);
      }
      const data = await resp.json();
      setFunctionCompounds(data);
      setTimeout(() => pushHistory(), 0);
    } catch (e) {
      if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        setError("Cannot reach the API server. Please ensure the backend is running at " + API_BASE);
      } else {
        setError(e.message);
      }
    } finally {
      setFunctionCompoundsLoading(false);
    }
  }, [pushHistory]);

  // Switch mode
  const handleModeSwitch = useCallback((mode) => {
    setAppMode(mode);
    setError(null);
    if (mode === "function") {
      // Clear compound search state
      setResults(null);
      setSearchPerformed(false);
      setPatentResults(null);
      setPatentSearchPerformed(false);
      setActiveList(null);
      setListData(null);
      // Fetch functions if not already loaded
      if (!functions) handleFetchFunctions();
    } else {
      // Clear function state
      setFunctions(null);
      setSelectedFunction(null);
      setFunctionCompounds(null);
      setPatentResults(null);
      setPatentSearchPerformed(false);
    }
    setTimeout(() => pushHistory(), 0);
  }, [functions, handleFetchFunctions, pushHistory]);

  // Reset to homepage initial state
  const handleReset = useCallback(() => {
    setQueryType("NAME");
    setQueryValue("");
    setLoading(false);
    setError(null);
    setResults(null);
    setSearchPerformed(false);
    setActiveList(null);
    setListData(null);
    setListLoading(false);
    setPatentResults(null);
    setPatentSearchPerformed(false);
    setPatentPage(1);
    setAppMode("compound");
    setFunctions(null);
    setFunctionsLoading(false);
    setSelectedFunction(null);
    setFunctionCompounds(null);
    setFunctionCompoundsLoading(false);
    setFunctionPage(1);
  }, []);

  // Fetch functions when entering function mode
  useEffect(() => {
    if (appMode === "function" && !functions && !functionsLoading) {
      handleFetchFunctions();
    }
  }, [appMode, functions, functionsLoading, handleFetchFunctions]);

  const handleKeyDown = useCallback((e) => {
    if (e.key === "Enter" && !loading) handleSearch();
  }, [handleSearch, loading]);

  const handleDownload = useCallback(() => {
    if (!results) return;
    const blob = new Blob([JSON.stringify(results, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    a.href = url;
    a.download = `iris_${results.query || "search"}_${new Date().toISOString().slice(0,10)}.json`;
    a.click();
    URL.revokeObjectURL(url);
  }, [results]);

  // List button handlers
  const LIST_BUTTONS = [
    { type: "hpat", label: "HPAT_LIST" },
    { type: "tp_hpat", label: "TP-HPAT_LIST" },
    { type: "cn_key", label: "CN_KEY_LIST" },
    { type: "eu_key", label: "EU_KEY_LIST" },
    { type: "jp_key", label: "JP_KEY_LIST" },
    { type: "kr_key", label: "KR_KEY_LIST" },
    { type: "us_key", label: "US_KEY_LIST" },
  ];

  const handleListClick = useCallback(async (listType) => {
    if (activeList === listType) {
      setActiveList(null);
      setListData(null);
      return;
    }
    setActiveList(listType);
    setListLoading(true);
    setListData(null);
    setError(null);
    // Clear search results when viewing a list
    setResults(null);
    setSearchPerformed(false);
    try {
      const resp = await fetch(`${API_BASE}/api/compounds/${listType}`);
      if (!resp.ok) {
        const detail = (await resp.json().catch(() => ({}))).detail;
        throw new Error(detail || `Server error (${resp.status})`);
      }
      const data = await resp.json();
      setListData(data);
      setTimeout(() => pushHistory(), 0);
    } catch (e) {
      if (e.message.includes("Failed to fetch") || e.message.includes("NetworkError")) {
        setError("Cannot reach the API server. Please ensure the backend is running at " + API_BASE);
      } else {
        setError(e.message);
      }
      setActiveList(null);
    } finally {
      setListLoading(false);
    }
  }, [activeList, pushHistory]);

  const handleListRowClick = useCallback((compoundId) => {
    // Update the search input and trigger a search by ID
    setQueryValue(String(compoundId));
    setQueryType("ID");
    setAppMode("compound");
    handleSearch(compoundId);
  }, [handleSearch]);

  const compoundEntries = results?.results ? Object.entries(results.results) : [];
  const allPatents = [];
  compoundEntries.forEach(([id, compound]) => {
    if (compound.patents && typeof compound.patents === "object") {
      Object.entries(compound.patents).forEach(([patNum, patData]) => {
        allPatents.push({ patentNum: patNum, patent: patData, compoundId: id });
      });
    }
  });

  return (
    <>
    <AmbientBackground/>
    <div className="app-container">
      {/* Top Bar: Logo (left) + Mode Toggle (right) */}
      <div className="top-bar">
        <div className="top-bar-left" onClick={handleReset} title="Back to homepage" style={{cursor:"pointer"}}>
          <div className="iris-logo"><IrisLogo/></div>
          <div className="header-brand">
            <div className="header-title">IRIS</div>
            <div className="header-author">by KYH</div>
          </div>
        </div>
        <div className="mode-toggle-track">
          <button
            className={`mode-toggle-option${appMode === "compound" ? " active" : ""}`}
            onClick={(e) => { e.stopPropagation(); handleModeSwitch("compound"); }}>
            Compound Search
          </button>
          <button
            className={`mode-toggle-option${appMode === "function" ? " active" : ""}`}
            onClick={(e) => { e.stopPropagation(); handleModeSwitch("function"); }}>
            Function of Skincare
          </button>
        </div>
      </div>

      {/* ==========================================
           COMPOUND SEARCH MODE
           ========================================== */}
      {appMode === "compound" && (
      <>
        {/* Search Bar */}
        <div className="search-section">
          <div className="search-kicker">
            <span className="search-kicker-badge">Database loading completed</span>
            <span>Search compounds, patents, biotransformation products, and regional trend signals.</span>
          </div>
          <div className="search-row">
            <select className="search-select" value={queryType}
              onChange={e => setQueryType(e.target.value)}>
              {QUERY_TYPES.map(t => (
                <option key={t.value} value={t.value}>{t.label}</option>
              ))}
            </select>
            <input className="search-input" type="text"
              placeholder={queryType === "PATENT" ? "Search patent keyword..." : "Enter search value..."}
              value={queryValue}
              onChange={e => setQueryValue(e.target.value)}
              onKeyDown={handleKeyDown}
              autoFocus
            />
            <button className="search-btn" onClick={() => handleSearch()} disabled={loading}>
              {loading ? (
                <><span className="loading-spinner"/><span>Searching</span></>
              ) : (
                <><SearchIcon/><span>Search</span></>
              )}
            </button>
          </div>
          <div className="search-hints">
            <span className="search-hint">ID / CAS / CID / SMILES / Name</span>
            <span className="search-hint">Patent keyword fuzzy search</span>
            <span className="search-hint">HPAT and TP-HPAT quick lists</span>
          <span className="search-hint">Area key lists</span>
          </div>
        </div>

        {/* Quick List Buttons */}
        <div className="list-buttons-bar">
          {LIST_BUTTONS.map((btn, i) => (
            <React.Fragment key={btn.type}>
              {i === 2 && <span className="list-btn-divider"/>}
              <button
                className={`list-btn ${btn.type === "hpat" || btn.type === "tp_hpat" ? "hpat-group" : "key-group"}${activeList === btn.type ? " active" : ""}`}
                onClick={() => handleListClick(btn.type)}
                disabled={listLoading && activeList === btn.type}>
                {listLoading && activeList === btn.type ? (
                  <span className="loading-spinner" style={{width:12,height:12,borderWidth:2,display:"inline-block",marginRight:4,borderColor:"rgba(255,255,255,0.3)",borderTopColor:"#fff"}}/>
                ) : null}
                {btn.label}
              </button>
            </React.Fragment>
          ))}
        </div>

        {/* Compound List Table (from quick buttons) */}
        {activeList && (
          <CompoundListTable
            listType={LIST_BUTTONS.find(b => b.type === activeList)?.label || activeList}
            listData={listData}
            loading={listLoading}
            onRowClick={handleListRowClick}
            onClose={() => { setActiveList(null); setListData(null); }}
          />
        )}

        {/* Error */}
        {error && (
          <div className="error-msg">
            <ErrorIcon/>{error}
          </div>
        )}

        {/* Patent Search Results (displayed as compound list table) */}
        {patentSearchPerformed && patentResults && (() => {
          const pCompounds = patentResults.compounds || [];
          const pPageSize = 10;
          const pTotalPages = Math.max(1, Math.ceil(pCompounds.length / pPageSize));
          const pCurrentPage = Math.min(patentPage, pTotalPages);
          const pPageItems = pCompounds.slice((pCurrentPage - 1) * pPageSize, pCurrentPage * pPageSize);
          return (
          <div className="compound-list-section">
            <div className="list-section-header">
              <span className="list-section-title">
                Patent Search: &ldquo;{patentResults.keyword}&rdquo;
                <span style={{fontSize:"13px",fontWeight:400,color:"var(--text-muted)",marginLeft:8}}>
                  ({patentResults.count} compound{patentResults.count !== 1 ? "s" : ""})
                </span>
              </span>
              <button className="list-close-btn"
                onClick={() => { setPatentResults(null); setPatentSearchPerformed(false); setPatentPage(1); }}>&times;</button>
            </div>
            {patentResults.count === 0 ? (
              <div style={{textAlign:"center",padding:"28px 0",color:"var(--text-muted)",fontSize:"14px"}}>
                No compounds found with patents matching &ldquo;{patentResults.keyword}&rdquo;.
              </div>
            ) : (
              <>
                <table className="compound-list-table">
                  <thead>
                    <tr>
                      <th>ID</th>
                      <th>SMILES</th>
                      <th>HPAT</th>
                      <th>TP-HPAT</th>
                    </tr>
                  </thead>
                  <tbody>
                    {pPageItems.map((c, i) => (
                      <tr key={c._id || i} className="compound-list-row"
                        onClick={() => handleListRowClick(c._id)}>
                        <td>{c._id || "—"}</td>
                        <td style={{fontFamily:"monospace",fontSize:"12px",maxWidth:"360px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {c.SMILES || "—"}
                        </td>
                        <td>
                          <span className={`status-badge ${statusClass(c.HPAT)}`}>
                            <span className={`status-dot ${statusClass(c.HPAT)}`}/>
                            {String(c.HPAT ?? "Unknown")}
                          </span>
                        </td>
                        <td>
                          <span className={`status-badge ${statusClass(c["TP-HPAT"])}`}>
                            <span className={`status-dot ${statusClass(c["TP-HPAT"])}`}/>
                            {String(c["TP-HPAT"] ?? "Unknown")}
                          </span>
                        </td>
                      </tr>
                    ))}
                  </tbody>
                </table>
                {pTotalPages > 1 && (
                  <Pagination page={pCurrentPage} totalPages={pTotalPages}
                    onPageChange={setPatentPage}/>
                )}
              </>
            )}
          </div>
          );
        })()}

        {/* Compound Search No Results */}
        {searchPerformed && !loading && !error && (!results || results.count === 0) && !patentSearchPerformed && (
          <div className="no-results">
            <div className="no-results-icon"><SearchEmptyIcon/></div>
            <div className="no-results-title">No results found</div>
            <div className="no-results-desc">
              Try a different query or query type.
            </div>
          </div>
        )}

        {/* Compound Search Results */}
        {results && results.count > 0 && (
          <>
            <div className="results-summary">
              Found <span className="results-count">{results.count}</span> result{results.count !== 1 ? "s" : ""}
              for "<strong>{results.query}</strong>"
              {results.query_type ? <> in <strong>{results.query_type}</strong></> : null}
            </div>

            {/* Section 1: Compound Info */}
            <div className="compound-section">
              <div className="section-title">Compound Information</div>
              {compoundEntries.map(([id, compound]) => (
                <CompoundInfo key={id} compound={{_id: id, ...compound}}/>
              ))}
              <div className="download-section">
                <button className="download-btn" onClick={handleDownload}>
                  <DownloadIcon/> Download JSON
                </button>
              </div>
            </div>

            {/* Section 2: Biotransform Products */}
            <BioTransformSection compoundEntries={compoundEntries} pageSize={5}/>

            {/* Section 3: Patents */}
            <PatentsSection allPatents={allPatents} pageSize={5}/>

            {/* Section 4: Charts */}
            <div className="charts-section">
              <div className="section-title">Historical Trends</div>
              <ChartsSection compounds={results.results}/>
            </div>
          </>
        )}
      </>
      )}

      {/* ==========================================
           FUNCTION OF SKINCARE MODE
           ========================================== */}
      {appMode === "function" && (
      <>
        {/* Error */}
        {error && (
          <div className="error-msg">
            <ErrorIcon/>{error}
          </div>
        )}

        {/* Function List — when no specific function is selected */}
        {!selectedFunction && (
          <div className="function-list-section">
            <div className="section-title">Function of Skincare</div>
            {functionsLoading ? (
              <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)"}}>
                <span className="loading-spinner" style={{borderColor:"rgba(108,92,231,0.2)",borderTopColor:"var(--iris-primary)",display:"inline-block",marginRight:8}}/>
                Loading functions...
              </div>
            ) : functions && functions.length > 0 ? (
              <>
                <div className="results-summary" style={{marginBottom:18}}>
                  <span className="results-count">{functions.length}</span> unique function{functions.length !== 1 ? "s" : ""} identified across all patents
                </div>
                <div className="function-grid">
                  {functions.map(fn => (
                    <div key={fn} className="function-card"
                      onClick={() => handleFunctionClick(fn)}>
                      {fn}
                    </div>
                  ))}
                </div>
              </>
            ) : !functionsLoading && (
              <div style={{textAlign:"center",padding:"40px 0",color:"var(--text-muted)",fontSize:"14px"}}>
                No functions found.
              </div>
            )}
          </div>
        )}

        {/* Function Compounds — when a function is selected */}
        {selectedFunction && (
          <>
            <button className="function-back-btn" onClick={() => { setSelectedFunction(null); setFunctionCompounds(null); setTimeout(() => pushHistory(), 0); }}>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                <polyline points="15 18 9 12 15 6"/>
              </svg>
              Back to all functions
            </button>

            {functionCompoundsLoading ? (
              <div className="compound-list-section">
                <div style={{textAlign:"center",padding:"32px 0",color:"var(--text-muted)"}}>
                  <span className="loading-spinner" style={{borderColor:"rgba(108,92,231,0.2)",borderTopColor:"var(--iris-primary)",display:"inline-block",marginRight:8}}/>
                  Loading compounds for &ldquo;{selectedFunction}&rdquo;...
                </div>
              </div>
            ) : functionCompounds ? (() => {
              const fCompounds = functionCompounds.compounds || [];
              const fPageSize = 10;
              const fTotalPages = Math.max(1, Math.ceil(fCompounds.length / fPageSize));
              const fCurrentPage = Math.min(functionPage, fTotalPages);
              const fPageItems = fCompounds.slice((fCurrentPage - 1) * fPageSize, fCurrentPage * fPageSize);
              return (
              <div className="compound-list-section">
                <div className="list-section-header">
                  <span className="list-section-title">
                    &ldquo;{selectedFunction}&rdquo;
                    <span style={{fontSize:"13px",fontWeight:400,color:"var(--text-muted)",marginLeft:8}}>
                      ({functionCompounds.count} compound{functionCompounds.count !== 1 ? "s" : ""})
                    </span>
                  </span>
                </div>
                {functionCompounds.count === 0 ? (
                  <div style={{textAlign:"center",padding:"28px 0",color:"var(--text-muted)",fontSize:"14px"}}>
                    No compounds matched this function.
                  </div>
                ) : (
                  <>
                    <table className="compound-list-table">
                      <thead>
                        <tr>
                          <th>ID</th>
                          <th>SMILES</th>
                          <th>HPAT</th>
                          <th>TP-HPAT</th>
                        </tr>
                      </thead>
                      <tbody>
                        {fPageItems.map((c, i) => (
                          <tr key={c._id || i} className="compound-list-row"
                            onClick={() => handleListRowClick(c._id)}>
                            <td>{c._id || "—"}</td>
                            <td style={{fontFamily:"monospace",fontSize:"12px",maxWidth:"360px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                              {c.SMILES || "—"}
                            </td>
                            <td>
                              <span className={`status-badge ${statusClass(c.HPAT)}`}>
                                <span className={`status-dot ${statusClass(c.HPAT)}`}/>
                                {String(c.HPAT ?? "Unknown")}
                              </span>
                            </td>
                            <td>
                              <span className={`status-badge ${statusClass(c["TP-HPAT"])}`}>
                                <span className={`status-dot ${statusClass(c["TP-HPAT"])}`}/>
                                {String(c["TP-HPAT"] ?? "Unknown")}
                              </span>
                            </td>
                          </tr>
                        ))}
                      </tbody>
                    </table>
                    {fTotalPages > 1 && (
                      <Pagination page={fCurrentPage} totalPages={fTotalPages}
                        onPageChange={setFunctionPage}/>
                    )}
                  </>
                )}
              </div>
              );
            })() : null}
          </>
        )}
      </>
      )}

      {/* Footer */}
      <div className="footer">
        IRIS &copy; {new Date().getFullYear()} &mdash; Skincare Compounds Intelligence Platform &mdash; yunhk@foxmail.com
      </div>
    </div>
    </>
  );
}

const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<App/>);
</script>
</body>
</html>
